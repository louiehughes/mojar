<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="alternate" hreflang="es" href="https://www.mojar.es?lang=es">
    <link rel="alternate" hreflang="gl" href="https://www.mojar.es?lang=gl">
    <link rel="alternate" hreflang="en" href="https://www.mojar.es?lang=en">
    <link rel="alternate" hreflang="x-default" href="https://www.mojar.es">
    <title>Mojar - Estudio Gastronómico</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray: #666666;
            --light-gray: #F5F5F5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--black);
            background: var(--white);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            border-bottom: 1px solid var(--black);
            z-index: 1000;
            padding: 0.75rem 4rem;
            transition: transform 0.3s ease;
        }

        .hidden-nav {
            transform: translateY(-100%);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .logo img {
            height: 80px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--black);
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 0.5;
        }

        .lang-selector {
            display: flex;
            gap: 0.5rem;
            border-left: 1px solid var(--black);
            padding-left: 1.5rem;
        }

        .lang-btn {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .lang-btn.active {
            color: var(--black);
            font-weight: 600;
        }

        .lang-btn:hover {
            color: var(--black);
        }

        /* Hero Section */
        .hero {
            margin-top: 67px;
            height: 90vh;
            position: relative;
            overflow: hidden;

            background-image: url("imagenes/hero.JPG");
            background-size: cover;
            background-position: center;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;

            background: linear-gradient(
              to top,
                rgba(0,0,0,0.65) 0%,
                rgba(0,0,0,0.25) 35%,
                rgba(0,0,0,0) 60%
            );
        }       

        .hero-content {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            right: 4rem;
            max-width: 800px;
            z-index: 2;
        }


        .hero h1 {
            font-size: 4rem;
            font-style: italic;
            font-weight: 600;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
            text-transform: lowercase;
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--white);
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            color: var(--light-gray);
            letter-spacing: 0.05em;
        }

        /* Flecha scroll down */
        .scroll-arrow {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--white);
            text-decoration: none;
            z-index: 3;
            animation: bounce 2s infinite;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.3s;
        }  

        .scroll-arrow:hover {
            opacity: 1;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) translateY(0);
            }   
            40% {
                transform: translateX(-50%) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) translateY(-5px);
            }
        }

        /* Responsive - ocultar en móvil */ 
        @media (max-width: 768px) {
            .scroll-arrow {
                display: none;
            }
        }

        /* Section Styles */
        section {
            padding: 6rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 3rem;
            text-transform: lowercase;
        }

        /* About Section */
        .about-intro {
            max-width: 800px;
            margin: 0 auto 4rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--gray);
        }

        .team {
            display: flex;
            gap: 4rem;
            margin-top: 4rem;
            align-items: flex-start;
        }

        .team-member {
            flex: 1;
            display: flex;
            gap: 2rem;
            align-items: flex-start;
        }

        .member-photo {
            width: 200px;
            height: 250px;
            flex-shrink: 0;
            background: var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-family: 'EB Garamond', Georgia, serif;
            font-style: italic;
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .member-role {
            color: var(--gray);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
        }

        .member-description {
            color: var(--gray);
            line-height: 1.8;
        }

        /* Services Section */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        .service-item {
            padding: 2rem;
            border: 1px solid var(--black);
        }

        .service-title {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .service-description {
            color: var(--gray);
            line-height: 1.8;
        }

        /* Projects Section */
        .projects-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1.5rem;
            background: var(--white);
            border: 1px solid var(--black);
            color: var(--black);
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--black);
            color: var(--white);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }       
        }

        @media (max-width: 600px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
        .project-card {
            break-inside: avoid;
            display: block;
            margin-bottom: 2rem;
        }

        .project-card {
            cursor: pointer;
            transition: transform 0.3s, opacity 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-5px);
            opacity: 0.9;
        }

        .project-image {
            width: 100%;
            aspect-ratio: 16/10;
            background: var(--light-gray);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            transition: filter 0.3s;
            overflow: hidden;
        }

        .project-card:hover .project-image {
            filter: brightness(0.95);
        }

        .project-tags {
            display: none;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .project-description {
            color: var(--gray);
            line-height: 1.6;
            font-size: 0.95rem;
        }


        /* Blog Section */
        /* 
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;

        .blog-card {

        .blog-card:hover {

            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .blog-excerpt {
            color: var(--gray);
            line-height: 1.6;
        }

        /* Contacto */
        .contact{
            padding: 6rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 4rem;
            text-transform: lowercase;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: start;
        }

        /* Columna izquierda — texto */
        .contact-left {}

        .contact-tagline {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: clamp(1.6rem, 2.5vw, 2.2rem);
            font-style: italic;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            letter-spacing: 0.01em;
        }

        .contact-body {
            color: var(--gray);
            line-height: 1.9;
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        /* Columna derecha — datos de contacto */
        .contact-right {}

        .contact-divider {
            width: 40px;
            height: 1px;
            background: var(--black);
            margin-bottom: 2.5rem;
        }

        .contact-items {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.4rem 0;
            border-bottom: 1px solid var(--black);
            text-decoration: none;
            color: var(--black);
            transition: opacity 0.3s;
        }

        .contact-item:first-child {
            border-top: 1px solid var(--black);
        }

        .contact-item:hover {
            opacity: 0.5;
        }

        .contact-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--black);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .contact-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gray);
            display: block;
            margin-bottom: 0.2rem;
        }

        .contact-value {
            font-size: 1rem;
            letter-spacing: 0.03em;
        }

        /* Responsive */
        @media (max-width: 900px) {
            #contacto {
                padding: 4rem 2rem;
            }

            .contact-wrapper {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
        }

        @media (max-width: 480px) {
            #contacto {
                padding: 3rem 1.5rem;
            }

            .section-title {
                font-size: 2rem;
                margin-bottom: 2.5rem;
            }
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--black);
            padding: 3rem 4rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .footer-links a {
            color: var(--black);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 0.5;
        }

        .copyright {
            color: var(--gray);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            nav {
                padding: 1rem 2rem;
            }

            .nav-links {
                gap: 1.5rem;
                font-size: 0.9rem;
            }

            section {
                padding: 4rem 2rem;
            }

            .projects-grid {
                flex-direction: column;
            }

            .projects-column {
                animation: none !important;
            }

            .team {
                flex-direction: column;
                gap: 3rem;
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                font-size: 0.85rem;
            }

            .lang-selector {
                border-left: none;
                border-top: 1px solid var(--black);
                padding-left: 0;
                padding-top: 0.75rem;
            }

            section {
                padding: 3rem 1.5rem;
            }

            .hero {
                height: 70vh;
            }

            .hero {
                margin-top: 110px; /* compensa el nav apilado */
            }

            .hero-content {
                bottom: 2rem;
                left: 1.5rem;
                right: 1.5rem;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .team-member {
                flex-direction: column;
            }

            .member-photo {
                width: 100%;
                max-width: 250px;
                margin: 0 auto;
            }

            .projects-grid,
            .blog-grid {
                gap: 2rem;
            }

            .services-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero {
                margin-top: 120px;
                height: 60vh;
            }

            .hero-content {
                left: 1rem;
                right: 1rem;
                bottom: 1.5rem;
            }
            .section-title {
                font-size: 1.75rem;
            }

            .service-item {
                padding: 1.5rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>

                    <label for="message" id="form-message-label">Mensaje</label>
                    <textarea id="message" name="message" required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="form-submit">Enviar mensaje</button>
            </form>
        </div>
    </section>
    -->
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#inicio" id="footer-home">Inicio</a>
                <a href="#sobre-nosotros" id="footer-about">Sobre nosotros</a>
                <a href="#proyectos" id="footer-projects">Proyectos</a>
                <a href="#servicios" id="footer-services">Servicios</a>
                <a href="#contacto" id="footer-contact">Contacto</a>
                <a href="aviso-legal.html">Aviso Legal</a>
                <a href="privacidad.html">Privacidad</a>
            </div>
            <p class="copyright" id="footer-rights"></p>
        </div>
    </footer>

    <!-- CONTENIDO EDITABLE - Carga desde contenido.js -->
    <script src="contenido.js"></script>
    
    <script>
        // Cargar contenido desde contenido.js
        function cargarContenido(lang) {
            const content = CONTENIDO[lang];
            
            // Hero
            document.getElementById('hero-subtitle').textContent = content.hero.subtitle;
            
            // Navigation
            document.getElementById('nav-home').textContent = content.nav.home;
            document.getElementById('nav-about').textContent = content.nav.about;
            document.getElementById('nav-projects').textContent = content.nav.projects;
            document.getElementById('nav-services').textContent = content.nav.services;
            /* document.getElementById('nav-blog').textContent = content.nav.blog; */
            document.getElementById('nav-contact').textContent = content.nav.contact;
            
            // About
            document.getElementById('about-title').textContent = content.about.title;
            document.getElementById('about-intro').textContent = content.about.intro;
            
            // Team
            const teamContainer = document.getElementById('team-container');
            teamContainer.innerHTML = content.about.team.map(member => `
                <div class="team-member">
                    <div class="member-photo">
                        ${member.photo ? `<img src="${member.photo}" alt="${member.name}">` : `[Foto de ${member.name}]`}
                    </div>
                    <div class="member-info">
                        <h3 class="member-name">${member.name}</h3>
                        <p class="member-role">${member.role}</p>
                        <p class="member-description">${member.description}</p>
                    </div>
                </div>
            `).join('');
            
            // Projects
            document.getElementById('projects-title').textContent = content.projects.title;
            document.getElementById('filter-all').textContent = content.projects.filters.all;
            document.getElementById('filter-eventos').textContent = content.projects.filters.eventos;
            document.getElementById('filter-investigacion').textContent = content.projects.filters.investigacion;
            document.getElementById('filter-talleres').textContent = content.projects.filters.talleres;
            document.getElementById('filter-produccion').textContent = content.projects.filters.produccion;
            
            // Distribuir proyectos en columnas
            const container = document.getElementById('projectsContainer');

            container.innerHTML = content.projects.items.map(project => `
            <a href="${project.url}" class="project-card" data-tags="${project.tags.join(' ')}">
                <div class="project-image">
                    ${project.image ? `<img src="${project.image}" alt="${project.title}">` : `[Imagen: ${project.title}]`}
                </div>
                <h3 class="project-title">${project.title}</h3>
                <p class="project-description">${project.description}</p>
            </a>
            `).join('');
            
            // Services
            document.getElementById('services-title').textContent = content.services.title;
            document.getElementById('services-container').innerHTML = content.services.items.map(service => `
                <div class="service-item">
                    <h3 class="service-title">${service.title}</h3>
                    <p class="service-description">${service.description}</p>
                </div>
            `).join('');
            
            /*// Blog
            document.getElementById('blog-title').textContent = content.blog.title;
            document.getElementById('blog-container').innerHTML = content.blog.items.map(post => `
                <a href="${post.url}" class="blog-card">
                    ${post.image ? `<div class="blog-image"><img src="${post.image}" alt="${post.title}"></div>` : ''}
                <p class="blog-date">${post.date}</p>
                <h3 class="blog-title">${post.title}</h3>
                <p class="blog-excerpt">${post.excerpt}</p>
                </a>
            `).join('');*/
            
            // Contact
            document.getElementById('contact-title').textContent = content.contact.title;
            document.getElementById('contact-tagline').textContent = content.contact.tagline;
            document.getElementById('contact-body').textContent = content.contact.body;
            document.getElementById('contact-label-email').textContent = content.contact.labels.email;
            document.getElementById('contact-label-whatsapp').textContent = content.contact.labels.whatsapp;
            document.getElementById('contact-label-instagram').textContent = content.contact.labels.instagram;
            
            // Footer
            document.getElementById('footer-home').textContent = content.nav.home;
            document.getElementById('footer-about').textContent = content.nav.about;
            document.getElementById('footer-projects').textContent = content.nav.projects;
            document.getElementById('footer-services').textContent = content.nav.services;
            /* document.getElementById('footer-blog').textContent = content.nav.blog; */
            document.getElementById('footer-contact').textContent = content.nav.contact;
            document.getElementById('footer-rights').textContent = content.footer.rights;
        }

        // Language selector
        const langBtns = document.querySelectorAll('.lang-btn');

        // Detectar idioma desde URL o usar español por defecto
        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang') || 'es';

        // Asegurarse de que el idioma existe
        if (!['es', 'gl', 'en'].includes(currentLang)) currentLang = 'es';

        // Marcar botón activo
        langBtns.forEach(btn => {
            if (btn.dataset.lang === currentLang) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
            const lang = btn.dataset.lang;
                // Cambiar URL sin recargar la página
                const url = new URL(window.location);
                url.searchParams.set('lang', lang);
                window.history.pushState({}, '', url);

                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = lang;
                cargarContenido(currentLang);
            });
        });

        // Projects filter
        const filterBtns = document.querySelectorAll('.filter-btn');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {

                const filter = btn.dataset.filter;

                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const projects = document.querySelectorAll('.project-card');

                projects.forEach(project => {

                    const tags = project.dataset.tags.split(' ');

                    if (filter === 'all' || tags.includes(filter)) {
                        project.classList.remove('hidden');
                    } else {
                        project.classList.add('hidden');
                    }
                });
            });
        });

        // Contact form
        //document.getElementById('contactForm').addEventListener('submit', (e) => {
        //    e.preventDefault();
        //    alert('Formulario enviado! (Configura tu backend aquí)');
        //});

        // Ocultar/mostrar nav al hacer scroll
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;

            if (currentScrollY > lastScrollY && currentScrollY > 100) {
                // Scrolleando hacia abajo
                document.querySelector('nav').classList.add('hidden-nav');
            } else {
                // Scrolleando hacia arriba
                document.querySelector('nav').classList.remove('hidden-nav');
            }

            lastScrollY = currentScrollY;
        });

        // Cargar contenido inicial
        cargarContenido('es');
    </script>
</body>
</html>
