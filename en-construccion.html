<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojar — En construcción</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            border-bottom: 1px solid var(--black);
            z-index: 1000;
            padding: 0.75rem 4rem;
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 80px;
            width: auto;
        }

        .lang-selector {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .lang-btn.active {
            color: var(--black);
            font-weight: 600;
        }

        .lang-btn:hover { color: var(--black); }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 4rem 4rem;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        .label {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 2.5rem;
            display: block;
        }

        .title {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.15;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--black);
            margin: 2rem auto;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--gray);
            line-height: 1.8;
            letter-spacing: 0.03em;
            margin-bottom: 3rem;
        }

        .back-link {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            border: 1px solid var(--black);
            color: var(--black);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s;
        }

        .back-link:hover {
            background: var(--black);
            color: var(--white);
        }

        footer {
            border-top: 1px solid var(--black);
            padding: 1.5rem 4rem;
            text-align: center;
        }

        .copyright {
            color: var(--gray);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            nav { padding: 0.75rem 1.5rem; }
            main { padding: 100px 1.5rem 3rem; }
            footer { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <div class="logo">
                <a href="https://www.mojar.es"><img src="imagenes/mojar_logo.png" alt="mojar"></a>
            </div>
            <div class="lang-selector">
                <button class="lang-btn" data-lang="es">ES</button>
                <button class="lang-btn" data-lang="gl">GL</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <span class="label" id="label"></span>
            <h1 class="title" id="title"></h1>
            <div class="divider"></div>
            <p class="subtitle" id="subtitle"></p>
            <a href="#" class="back-link" id="back-link"></a>
        </div>
    </main>

    <footer>
        <p class="copyright" id="copyright"></p>
    </footer>

    <script>
        const CONTENIDO = {
            es: {
                label: 'Próximamente',
                title: 'Estamos trabajando<br>en esto',
                subtitle: 'Esta sección está en desarrollo.<br>Vuelve pronto, que estamos cocinando algo bueno.',
                backLink: 'Volver al inicio',
                copyright: '© 2026 Mojar. Todos los derechos reservados.'
            },
            gl: {
                label: 'En breve',
                title: 'Estamos traballando<br>isto',
                subtitle: 'Esta sección está en desenvolvemento.<br>Volve pronto, que estamos a cociñar algo bo.',
                backLink: 'Volver ao inicio',
                copyright: '© 2026 Mojar. Todos os dereitos reservados.'
            },
            en: {
                label: 'Coming soon',
                title: 'We\'re working<br>on this',
                subtitle: 'This section is under development.<br>Come back soon — we\'re cooking something good.',
                backLink: 'Back to home',
                copyright: '© 2026 Mojar. All rights reserved.'
            }
        };

        function cargarContenido(lang) {
            const c = CONTENIDO[lang];
            document.getElementById('label').textContent = c.label;
            document.getElementById('title').innerHTML = c.title;
            document.getElementById('subtitle').innerHTML = c.subtitle;
            document.getElementById('back-link').textContent = c.backLink;
            document.getElementById('back-link').href = `https://www.mojar.es?lang=${lang}`;
            document.getElementById('copyright').textContent = c.copyright;
            document.documentElement.lang = lang;
        }

        // Detectar idioma desde URL
        const urlParams = new URLSearchParams(window.location.search);
        let currentLang = urlParams.get('lang') || 'es';
        if (!['es', 'gl', 'en'].includes(currentLang)) currentLang = 'es';

        // Botones de idioma
        const langBtns = document.querySelectorAll('.lang-btn');

        langBtns.forEach(btn => {
            if (btn.dataset.lang === currentLang) btn.classList.add('active');
            btn.addEventListener('click', () => {
                const lang = btn.dataset.lang;
                const url = new URL(window.location);
                url.searchParams.set('lang', lang);
                window.history.pushState({}, '', url);
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = lang;
                cargarContenido(lang);
            });
        });

        cargarContenido(currentLang);
    </script>

</body>
</html>
