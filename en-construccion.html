<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mojar — En construcción</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #000000;
            --white: #FFFFFF;
            --gray: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav igual que la web principal */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            border-bottom: 1px solid var(--black);
            z-index: 1000;
            padding: 0.75rem 4rem;
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 80px;
            width: auto;
        }

        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 4rem 4rem;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        .label {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 2.5rem;
            display: block;
        }

        .title {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            font-weight: 400;
            font-style: italic;
            line-height: 1.15;
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--black);
            margin: 2rem auto;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--gray);
            line-height: 1.8;
            letter-spacing: 0.03em;
            margin-bottom: 3rem;
        }

        .back-link {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            border: 1px solid var(--black);
            color: var(--black);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: background 0.3s, color 0.3s;
        }

        .back-link:hover {
            background: var(--black);
            color: var(--white);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--black);
            padding: 1.5rem 4rem;
            text-align: center;
        }

        .copyright {
            color: var(--gray);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 0.75rem 1.5rem; }
            main { padding: 100px 1.5rem 3rem; }
            footer { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <div class="logo">
                <a href="/"><img src="imagenes/mojar_logo.png" alt="mojar"></a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <span class="label">Próximamente</span>
            <h1 class="title">Estamos trabajando<br>en esto</h1>
            <div class="divider"></div>
            <p class="subtitle">
                Esta sección está en desarrollo.<br>
                Vuelve pronto, que estamos cocinando algo bueno.
            </p>
            <a href="https://www.mojar.es" class="back-link">Volver al inicio</a>
        </div>
    </main>

    <footer>
        <p class="copyright">© 2026 Mojar. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
